services:
  - type: web
    name: embeddedcamps-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard (Neon connection string)
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_REFRESH_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://embeddedcamps.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
